name: Publish output MD to github pages

on:
  push:
    branches:
      - main
    paths:
      - out/index.html
      - out/past_arxiv/**
      - out/output.md
      - .github/workflows/publish_md_test.yml
  workflow_dispatch:
  workflow_run:
    workflows: ["Run daily arxiv"]
    types:
      - completed


permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use repository output on push
      if: github.event_name == 'push'
      run: |
        cp out/output.md output.md
        cp out/index.html index.html
        if [ -d out/past_arxiv ]; then
          cp -R out/past_arxiv past_arxiv
        fi
    - name: Download artifact
      if: github.event_name != 'push'
      id: download-artifact
      uses: dawidd6/action-download-artifact@v2
      with:
        workflow: cron_runs.yaml
        workflow_conclusion: success
        name: arxiv-scanner-outputs
    - name: Display structure of downloaded files
      run: ls -R
    - name: Check for site input
      id: check_files
      shell: sh
      run: |
        if [ -f index.html ]; then
          echo "files_exists=true" >> "$GITHUB_OUTPUT"
          echo "html_exists=true" >> "$GITHUB_OUTPUT"
        elif [ -f output.md ]; then
          echo "files_exists=true" >> "$GITHUB_OUTPUT"
          echo "html_exists=false" >> "$GITHUB_OUTPUT"
        else
          echo "files_exists=false" >> "$GITHUB_OUTPUT"
          echo "html_exists=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Prepare HTML site
      if: steps.check_files.outputs.html_exists == 'true'
      run: |
        mkdir -p dist
        cp index.html dist/index.html
        if [ -d past_arxiv ]; then
          cp -R past_arxiv dist/past_arxiv
        fi
    - name: Convert output.md to pages
      uses: wranders/markdown-to-pages-action@v0.1
      if: steps.check_files.outputs.files_exists == 'true' && steps.check_files.outputs.html_exists != 'true'
      with:
       token: ${{ secrets.GITHUB_TOKEN }}
       file: output.md
    - name: Fix dist permissions
      if: steps.check_files.outputs.files_exists == 'true'
      shell: sh
      run: |
        echo "Fixing file permissions in dist..."
        chmod -c -R +rX dist | while read line; do
          echo "::warning title=Invalid file permissions automatically fixed::$line"
        done
    - uses: actions/upload-pages-artifact@v5
      if: steps.check_files.outputs.files_exists == 'true'
      with:
        path: dist
    - uses: actions/deploy-pages@v5
      if: steps.check_files.outputs.files_exists == 'true'
      id: deployment
    
